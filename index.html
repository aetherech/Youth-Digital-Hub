<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>National TVET & SETA MVP</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif; background:#fff; color:#000; }
    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; border-radius: 0; }

    .app { min-height: 100vh; display: grid; grid-template-columns: 280px 1fr; }
    .sidebar { border-right: 1px solid #bbb; padding: 16px; }
    .topbar { border-bottom: 1px solid #bbb; padding: 16px; display:flex; gap:12px; align-items:center; justify-content:space-between; }
    .content { padding: 16px; }

    .card { border:1px solid #bbb; padding:16px; background:#fff; }
    .muted { color:#444; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }

    .btn { border:1px solid #000; background:#fff; padding:10px 12px; cursor:pointer; display:inline-block; }
    .btn.secondary { border-color:#777; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }

    .tabs { display:flex; gap:8px; }
    .tab { border:1px solid #bbb; padding:8px 10px; cursor:pointer; background:#fff; }
    .tab.active { border-color:#000; background:#eee; font-weight:600; }

    .field { display:grid; gap:6px; margin: 10px 0; }
    .input { border:1px solid #bbb; padding:10px; }

    .grid { display:grid; gap:12px; }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .grid.cols-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }

    .placeholder { height: 90px; border:1px solid #aaa; background:#ddd; }
    .badge { display:inline-flex; border:1px solid #000; padding:4px 8px; font-size:12px; font-weight:600; }
    .status { display:inline-flex; border:1px solid #777; background:#f2f2f2; padding:4px 8px; font-size:12px; }

    table { width:100%; border-collapse: collapse; }
    th, td { border-top:1px solid #bbb; padding:10px; text-align:left; vertical-align:top; }
    thead th { background:#eee; border-top:none; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right:none; border-bottom:1px solid #bbb; }
      .grid.cols-3 { grid-template-columns: 1fr; }
      .grid.cols-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="functionality.js"></script>
</body>
</html>
