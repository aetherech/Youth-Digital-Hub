<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>National TVET &amp; SETA MVP</title>
  <!-- App-wide visual styles used by all hash-routed views rendered from functionality.js -->
  <style>
    :root {
      color-scheme: light;
      --smoky-white: #EFF0F6;
      --purple: #D9B8F3;
      --old-flax: #DFF37D;
      --jet-black: #292B2D;
      --royal-blue: #4558C8;
      --salmon-orange: #EE5E37;
      --white: #ffffff;
      --border: rgba(41, 43, 45, 0.1);
      --border-strong: rgba(41, 43, 45, 0.16);
      --shadow: 0 28px 60px rgba(41, 43, 45, 0.1);
      --shadow-soft: 0 16px 36px rgba(41, 43, 45, 0.08);
      --radius-xl: 28px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --text: var(--jet-black);
      --muted: rgba(41, 43, 45, 0.66);
      --blue-tint: rgba(69, 88, 200, 0.12);
      --purple-tint: rgba(217, 184, 243, 0.34);
      --lime-tint: rgba(223, 227, 125, 0.36);
      --orange-tint: rgba(238, 94, 55, 0.16);
      --shell-gutter: clamp(16px, 3vw, 40px);
      --shell-vpad: clamp(14px, 2.2vw, 28px);
      --content-gap: clamp(16px, 1.8vw, 24px);
      --mobile-page-pad: 16px;
      --mobile-card-pad: 16px;
      --mobile-nav-height: 76px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Nunito Sans", "Avenir Next", "Segoe UI", sans-serif;
      background: var(--smoky-white);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      line-height: 1.5;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 34rem;
      height: 34rem;
      border-radius: 999px;
      filter: blur(12px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.55;
    }

    body::before {
      top: -10rem;
      left: -8rem;
      background:
        radial-gradient(circle at 30% 30%, rgba(217, 184, 243, 0.88), transparent 56%),
        radial-gradient(circle at 70% 50%, rgba(69, 88, 200, 0.2), transparent 58%);
    }

    body::after {
      right: -12rem;
      bottom: -10rem;
      background:
        radial-gradient(circle at 45% 40%, rgba(223, 227, 125, 0.8), transparent 54%),
        radial-gradient(circle at 65% 62%, rgba(69, 88, 200, 0.18), transparent 58%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    #root {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .app,
    .appShell {
      min-height: 100vh;
      width: 100%;
      display: grid;
      grid-template-columns: clamp(280px, 22vw, 320px) minmax(0, 1fr);
      gap: clamp(16px, 2vw, 24px);
      padding: var(--shell-vpad) var(--shell-gutter) calc(var(--shell-vpad) + 8px);
      align-items: start;
      max-width: none;
      margin: 0;
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(35, 38, 44, 0.96), rgba(35, 38, 44, 0.9));
      color: rgba(255, 255, 255, 0.9);
      border-radius: var(--radius-xl);
      padding: 24px 18px 20px;
      box-shadow: 0 14px 30px rgba(20, 22, 26, 0.18);
      position: sticky;
      top: var(--shell-vpad);
      min-height: calc(100vh - (var(--shell-vpad) * 2));
      width: 100%;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .sidebar::before,
    .sidebar::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0.12;
    }

    .sidebar::before {
      width: 11rem;
      height: 11rem;
      top: -4rem;
      right: -4rem;
      background: radial-gradient(circle, rgba(217, 184, 243, 0.7), transparent 68%);
    }

    .sidebar::after {
      width: 8rem;
      height: 8rem;
      bottom: -2rem;
      left: -2rem;
      background: radial-gradient(circle, rgba(223, 227, 125, 0.52), transparent 70%);
    }

    .sidebar .tab {
      width: 100%;
      justify-content: flex-start;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.74);
      padding: 13px 16px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .sidebar .tab.active {
      background: rgba(69, 88, 200, 0.3);
      color: rgba(255, 255, 255, 0.95);
      border-color: rgba(142, 156, 255, 0.35);
      box-shadow: 0 8px 16px rgba(30, 36, 78, 0.2);
    }

    .sidebar .tab:hover {
      color: rgba(255, 255, 255, 0.92);
      transform: translateX(1px);
      box-shadow: 0 6px 14px rgba(69, 88, 200, 0.1);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.78)),
        linear-gradient(120deg, rgba(217, 184, 243, 0.16), rgba(223, 227, 125, 0.12));
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 26px;
    }

    .mobileTopHeader {
      display: none;
    }

    .mobileBottomNav {
      display: none;
    }

    .mobileNotifyBtn {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(41, 43, 45, 0.12);
      background: rgba(255, 255, 255, 0.88);
      color: var(--jet-black);
      font-size: 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .mainShell {
      min-width: 0;
      width: 100%;
      display: grid;
      gap: var(--content-gap);
      align-content: start;
    }

    .content {
      min-width: 0;
      width: 100%;
      padding: 0 0 24px;
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: var(--content-gap);
      align-content: start;
    }

    .content > * {
      grid-column: 1 / -1;
      min-width: 0;
    }

    .card,
    .tile {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px;
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .card::before,
    .tile::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 0;
      background: transparent;
      opacity: 0;
    }

    .cardHeader,
    .tileHeader {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .cardHeader h1,
    .tileHeader h1,
    .cardHeader h2,
    .tileHeader h2,
    .cardHeader h3,
    .tileHeader h3,
    .card h1,
    .card h2,
    .card h3,
      h1,
      h2,
      h3 {
      margin: 0;
      color: var(--jet-black);
      line-height: 1.08;
      font-weight: 760;
    }

    .cardHeader p,
    .tileHeader p {
      margin: 0;
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    .layoutGrid12 {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: var(--content-gap);
      align-items: start;
    }

    .col-span-12 {
      grid-column: span 12;
      min-width: 0;
    }

    .col-span-8 {
      grid-column: span 8;
      min-width: 0;
    }

    .col-span-6 {
      grid-column: span 6;
      min-width: 0;
    }

    .col-span-4 {
      grid-column: span 4;
      min-width: 0;
    }

    .grid.cols-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.cols-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .desktopOnly {
      display: block;
    }

    .mobileOnly {
      display: none;
    }

    .field {
      display: grid;
      gap: 8px;
      margin: 0;
    }

    .input,
    .select {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--border-strong);
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(239, 240, 246, 0.9));
      padding: 13px 15px;
      color: var(--jet-black);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease, transform 140ms ease;
    }

    .input:focus,
    .select:focus {
      border-color: rgba(69, 88, 200, 0.46);
      box-shadow: 0 0 0 5px rgba(69, 88, 200, 0.12);
      background: var(--white);
      transform: translateY(-1px);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      padding: 11px 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease, border-color 140ms ease, color 140ms ease;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 24px rgba(41, 43, 45, 0.12);
    }

    .btn:disabled {
      opacity: 0.56;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btnPrimary {
      background: var(--royal-blue);
      color: var(--white);
      border-color: var(--royal-blue);
      box-shadow: 0 16px 28px rgba(69, 88, 200, 0.24);
    }

    .btnGhost {
      background: rgba(255, 255, 255, 0.78);
      color: var(--jet-black);
      border-color: rgba(69, 88, 200, 0.12);
      box-shadow: 0 10px 22px rgba(41, 43, 45, 0.05);
    }

    .btnDanger {
      background: var(--salmon-orange);
      color: var(--white);
      border-color: var(--salmon-orange);
      box-shadow: 0 16px 28px rgba(238, 94, 55, 0.24);
    }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(69, 88, 200, 0.12);
      background: rgba(255, 255, 255, 0.84);
      color: var(--jet-black);
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
      font-weight: 600;
    }

    .tab:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(69, 88, 200, 0.1);
    }

    .tab.active {
      background: linear-gradient(135deg, rgba(217, 184, 243, 0.95), rgba(238, 226, 255, 0.92));
      border-color: transparent;
      color: var(--jet-black);
      box-shadow: 0 14px 24px rgba(217, 184, 243, 0.24);
    }

    .applicationsSection,
    .applicationTabs {
      --accent: #7B8794;
      --accent-soft: rgba(123, 135, 148, 0.12);
      --accent-border: rgba(123, 135, 148, 0.24);
    }

    .applicationsSection.theme-bursary,
    .applicationTabs.theme-bursary {
      --accent: #8B5CF6;
      --accent-soft: color-mix(in srgb, #8B5CF6 14%, white);
      --accent-border: #D9C8FF;
    }

    .applicationsSection.theme-learnership,
    .applicationTabs.theme-learnership {
      --accent: #22C55E;
      --accent-soft: color-mix(in srgb, #22C55E 14%, white);
      --accent-border: #BFF2D6;
    }

    .applicationsSection.theme-course,
    .applicationTabs.theme-course {
      --accent: #4B6CB7;
      --accent-soft: color-mix(in srgb, #4B6CB7 14%, white);
      --accent-border: #CFE0FF;
    }

    .applicationsSection.theme-neutral,
    .applicationTabs.theme-neutral {
      --accent: #7B8794;
      --accent-soft: rgba(123, 135, 148, 0.12);
      --accent-border: rgba(123, 135, 148, 0.24);
    }

    .applicationsSection::before {
      height: 3px;
      opacity: 1;
      background: var(--accent, #7B8794);
    }

    .applicationsSection .dashboardSectionMeta {
      color: color-mix(in srgb, var(--accent, #7B8794) 58%, #6b7280);
    }

    .applicationTabs {
      gap: 8px;
      padding: 4px;
      border-radius: 14px;
      border: 1px solid rgba(41, 43, 45, 0.08);
      background: rgba(255, 255, 255, 0.62);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .applicationTabs .tab {
      min-height: 40px;
      padding: 9px 14px;
      border-radius: 12px;
      border: 1px solid rgba(41, 43, 45, 0.12);
      background: rgba(255, 255, 255, 0.96);
      color: rgba(41, 43, 45, 0.82);
      box-shadow: none;
    }

    .applicationTabs .tab:hover {
      border-color: var(--accent-border);
      box-shadow: 0 4px 9px rgba(41, 43, 45, 0.06);
    }

    .applicationTabs .tab.active {
      background: var(--accent-soft);
      border-color: var(--accent-border);
      color: color-mix(in srgb, var(--accent, #7B8794) 74%, #1f2937);
      box-shadow: inset 0 2px 0 var(--accent), 0 6px 12px rgba(41, 43, 45, 0.06);
    }

    .placeholder {
      width: 100%;
      height: 108px;
      border-radius: 20px;
      background:
        radial-gradient(circle at 25% 24%, rgba(223, 227, 125, 0.62), transparent 34%),
        radial-gradient(circle at 78% 22%, rgba(217, 184, 243, 0.7), transparent 30%),
        linear-gradient(135deg, rgba(69, 88, 200, 0.2), rgba(255, 255, 255, 0.8));
      border: 1px solid rgba(69, 88, 200, 0.1);
    }

    .badge,
    .status,
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 30px;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badgeBlue {
      background: rgba(69, 88, 200, 0.14);
      color: var(--royal-blue);
      border-color: rgba(69, 88, 200, 0.22);
    }

    .badgeGreen {
      background: rgba(223, 227, 125, 0.38);
      color: #6d741d;
      border-color: rgba(95, 114, 10, 0.16);
    }

    .badgeOrange {
      background: rgba(238, 94, 55, 0.12);
      color: var(--salmon-orange);
      border-color: rgba(238, 94, 55, 0.22);
    }

    .badgePurple {
      background: rgba(217, 184, 243, 0.38);
      color: #7f53b5;
      border-color: rgba(127, 83, 181, 0.2);
    }

    .badge,
    .chip {
      background: rgba(41, 43, 45, 0.08);
      color: var(--jet-black);
      border-color: rgba(41, 43, 45, 0.12);
    }

    .status {
      background: rgba(41, 43, 45, 0.06);
      color: var(--jet-black);
      border-color: rgba(41, 43, 45, 0.12);
    }

    .table,
    table {
      width: 100%;
      border-collapse: collapse;
      border-spacing: 0;
      overflow: hidden;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.74);
    }

    .table th,
    .table td,
    th,
    td {
      text-align: left;
      padding: 14px 12px;
      vertical-align: top;
      border-top: 1px solid rgba(41, 43, 45, 0.08);
    }

    .table thead th,
    thead th {
      border-top: 0;
      background: linear-gradient(90deg, rgba(69, 88, 200, 0.12), rgba(217, 184, 243, 0.18));
      color: var(--jet-black);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .table tbody tr,
    tbody tr {
      transition: background 140ms ease, transform 140ms ease;
    }

    .table tbody tr:hover,
    tbody tr:hover {
      background: rgba(69, 88, 200, 0.05);
    }

    .adminApplicantRowClickable {
      cursor: pointer;
    }

    .adminApplicantRowClickable:focus-visible {
      outline: 2px solid rgba(69, 88, 200, 0.5);
      outline-offset: -2px;
    }

    .adminApplicantViewBtn {
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      width: auto;
    }

    .adminApplicantDrawerOverlay {
      position: fixed;
      inset: 0;
      z-index: 88;
      display: flex;
      justify-content: flex-end;
      background: rgba(17, 22, 29, 0.42);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .adminApplicantDrawerOverlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .adminApplicantDrawerPanel {
      position: fixed;
      top: 0;
      right: 0;
      width: clamp(420px, 42vw, 520px);
      max-width: calc(100vw - 12px);
      height: 100vh;
      background: rgba(255, 255, 255, 0.99);
      border-left: 1px solid rgba(41, 43, 45, 0.12);
      box-shadow: -18px 0 36px rgba(17, 22, 29, 0.2);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
      transform: translateX(14px);
      transition: transform 180ms ease;
    }

    .adminApplicantDrawerOverlay.open .adminApplicantDrawerPanel {
      transform: translateX(0);
    }

    .adminApplicantDrawerHeader {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      padding: 18px;
      border-bottom: 1px solid rgba(41, 43, 45, 0.08);
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(8px);
    }

    .adminApplicantHeaderIdentity {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .adminApplicantHeaderIdentity h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .adminApplicantHeaderActions {
      display: grid;
      justify-items: end;
      gap: 6px;
      min-width: 130px;
    }

    .adminApplicantDrawerClose {
      min-height: 36px;
      padding: 7px 12px;
      width: auto;
    }

    .adminApplicantDrawerBody {
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 18px;
      display: grid;
      gap: 18px;
    }

    .adminApplicantSection {
      border-radius: 16px;
      border: 1px solid rgba(41, 43, 45, 0.08);
      box-shadow: 0 8px 16px rgba(41, 43, 45, 0.05);
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .adminApplicantSectionTitle {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 2px;
    }

    .adminApplicantInfoGrid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .adminApplicantInfoGrid div {
      display: grid;
      gap: 3px;
    }

    .adminApplicantInfoGrid span {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .adminApplicantInfoGrid b {
      font-size: 13px;
      line-height: 1.35;
      color: var(--jet-black);
    }

    .adminApplicantScoreRow {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .adminApplicantScoreValue {
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
      color: var(--jet-black);
    }

    .adminApplicantInsightList {
      margin: 0 0 0 16px;
      padding: 0;
      display: grid;
      gap: 4px;
    }

    .adminApplicantInsightList li {
      font-size: 12px;
      color: rgba(41, 43, 45, 0.76);
      line-height: 1.4;
    }

    .adminApplicantDocList {
      display: grid;
      gap: 10px;
    }

    .adminApplicantDocRow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(41, 43, 45, 0.09);
      background: rgba(255, 255, 255, 0.95);
      align-items: center;
    }

    .adminApplicantDocName {
      font-weight: 700;
      font-size: 13px;
      color: var(--jet-black);
    }

    .adminApplicantDocActions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      align-items: center;
      min-width: 180px;
    }

    .adminApplicantDocStatus {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(41, 43, 45, 0.06);
    }

    .adminApplicantDocStatus.is-submitted {
      color: #2b8a3e;
    }

    .adminApplicantDocStatus.is-missing {
      color: #7b8794;
    }

    .adminApplicantMiniBtn {
      min-height: 32px;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;

      background: rgba(69, 88, 200, 0.14);
      color: var(--royal-blue);
      border-color: rgba(69, 88, 200, 0.3);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .inlineProfileEditorActions {
      align-items: center;
      gap: 8px;
    }

    .inlineProfileToast {
      position: fixed;
      left: 50%;
      bottom: calc(14px + env(safe-area-inset-bottom));
      z-index: 88;
      transform: translate(-50%, 12px);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(23, 28, 38, 0.94);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 14px 24px rgba(17, 22, 29, 0.3);
      opacity: 0;
      transition: transform 150ms ease, opacity 150ms ease;
      pointer-events: none;
    }

    .inlineProfileToast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .srOnly {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .dangerZone {
      border: 1px solid rgba(238, 94, 55, 0.28);
      border-radius: 16px;
      padding: 10px 12px;
      background: rgba(238, 94, 55, 0.08);
    }

    .dangerZone > summary {
      cursor: pointer;
      font-weight: 700;
      list-style: none;
    }

    .dangerZone > summary::-webkit-details-marker {
      display: none;
    }

    .careerWizardCard {
      padding: 24px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(41, 43, 45, 0.08);
      box-shadow: 0 10px 18px rgba(41, 43, 45, 0.06);
    }

    .careerProgressTrack {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(41, 43, 45, 0.09);
      border: 1px solid rgba(41, 43, 45, 0.08);
    }

    .careerProgressFill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--royal-blue), var(--purple), var(--old-flax));
      transition: width 180ms ease;
    }

    .quizStepNavigator {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .quizStepLabel {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      font-weight: 700;
    }

    .quizStepScroller {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 1px 6px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .quizStepScroller::-webkit-scrollbar {
      height: 6px;
    }

    .quizStepScroller::-webkit-scrollbar-thumb {
      background: rgba(41, 43, 45, 0.2);
      border-radius: 999px;
    }

    .quizStepItem {
      flex: 0 0 auto;
      scroll-snap-align: center;
    }

    .quizStepCircle {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid rgba(41, 43, 45, 0.16);
      background: rgba(255, 255, 255, 0.94);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }

    .quizStepItem.is-completed .quizStepCircle {
      border-color: transparent;
      background: rgba(41, 43, 45, 0.09);
      color: #2b3139;
      animation: quizStepPop 160ms ease;
    }

    .quizStepItem.is-current .quizStepCircle {
      width: 38px;
      height: 38px;
      border: 2px solid var(--accent-colour, #A3E635);
      color: var(--jet-black);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent-colour, #A3E635) 18%, white);
      transform: translateY(-1px);
    }

    .quizStepItem.is-upcoming .quizStepCircle {
      background: rgba(255, 255, 255, 0.82);
      color: rgba(41, 43, 45, 0.6);
    }

    @keyframes quizStepPop {
      from {
        transform: scale(0.88);
      }
      to {
        transform: scale(1);
      }
    }

    .careerOptionsGrid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .careerOption {
      min-height: 50px;
      border-radius: 16px;
      border: 1px solid rgba(69, 88, 200, 0.14);
      background: rgba(255, 255, 255, 0.84);
      color: var(--jet-black);
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease, border-color 120ms ease;
    }

    .careerOption:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 16px rgba(69, 88, 200, 0.12);
    }

    .careerOption.active {
      background: rgba(163, 230, 53, 0.18);
      border-color: rgba(163, 230, 53, 0.5);
      color: var(--jet-black);
      box-shadow: 0 8px 14px rgba(129, 145, 20, 0.14);
    }

    .careerMatchGrid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .careerMatchCard {
      border-radius: 22px;
      border: 1px solid transparent;
      color: var(--jet-black);
      padding: 18px;
      box-shadow: 0 18px 30px rgba(41, 43, 45, 0.08);
    }

    .careerColorBlue {
      background: linear-gradient(150deg, rgba(69, 88, 200, 0.1), rgba(255, 255, 255, 0.95));
      border-color: rgba(69, 88, 200, 0.12);
    }

    .careerColorPurple {
      background: linear-gradient(150deg, rgba(217, 184, 243, 0.15), rgba(255, 255, 255, 0.95));
      border-color: rgba(127, 83, 181, 0.12);
    }

    .careerColorLime {
      background: linear-gradient(150deg, rgba(223, 243, 125, 0.14), rgba(255, 255, 255, 0.96));
      border-color: rgba(129, 145, 20, 0.12);
    }

    .careerColorOrange {
      background: linear-gradient(150deg, rgba(238, 94, 55, 0.1), rgba(255, 255, 255, 0.96));
      border-color: rgba(238, 94, 55, 0.12);
    }

    .careerTwoCol {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
      gap: 16px;
    }

    .careerStageGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .careerStageCard {
      border-radius: 18px;
      border: 1px solid rgba(69, 88, 200, 0.12);
      background: rgba(255, 255, 255, 0.95);
      padding: 14px;
      box-shadow: 0 12px 20px rgba(41, 43, 45, 0.06);
    }

    .careerOpportunitiesGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .careerOpportunityCard {
      border-radius: 16px;
      border: 1px solid rgba(41, 43, 45, 0.1);
      background: rgba(255, 255, 255, 0.94);
      padding: 12px;
      box-shadow: 0 10px 18px rgba(41, 43, 45, 0.06);
    }

    ul {
      margin-top: 8px;
    }

    @media (max-width: 1024px) {
      .app,
      .appShell {
        grid-template-columns: clamp(260px, 28vw, 300px) minmax(0, 1fr);
      }

      .content,
      .layoutGrid12,
      .dashboardLayoutGrid {
        grid-template-columns: repeat(8, minmax(0, 1fr));
      }

      .col-span-8,
      .dashboardPrimaryCol {
        grid-column: span 5;
      }

      .col-span-6 {
        grid-column: span 4;
      }

      .col-span-4,
      .dashboardSupportCol {
        grid-column: span 3;
      }

      .listingGrid,
      .grid.cols-3,
      .careerTwoCol {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .careerOptionsGrid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .inlineProfileInterestsGrid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .dashboardQuickHeaderActions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 900px) {
      .topbar {
        padding: 16px;
        border-radius: 20px;
      }
    }

    @media (max-width: 767px) {
      .app,
      .appShell {
        grid-template-columns: 1fr;
        padding: env(safe-area-inset-top) var(--mobile-page-pad) calc(var(--mobile-page-pad) + env(safe-area-inset-bottom));
        gap: 16px;
      }

      .sidebar {
        display: none;
      }

      .content,
      .layoutGrid12,
      .dashboardLayoutGrid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .col-span-12,
      .col-span-8,
      .col-span-6,
      .col-span-4,
      .dashboardPrimaryCol,
      .dashboardSupportCol {
        grid-column: 1 / -1;
      }

      body::before,
      body::after {
        opacity: 0.36;
      }

      .hasMobileHeader .topbar {
        display: none;
      }

      .mobileTopHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 20;
        padding: 6px 0 10px;
        background: linear-gradient(180deg, rgba(239, 240, 246, 0.95), rgba(239, 240, 246, 0.7));
        backdrop-filter: blur(10px);
      }

      .row,
      .tabs {
        width: 100%;
      }

      .btn,
      .tab {
        width: 100%;
      }

      .content {
        padding-bottom: calc(var(--mobile-nav-height) + env(safe-area-inset-bottom) + 20px);
      }

      .card,
      .tile {
        border-radius: 18px;
        padding: var(--mobile-card-pad);
        box-shadow: 0 8px 18px rgba(41, 43, 45, 0.08);
      }

      .card::before,
      .tile::before {
        height: 5px;
      }

      .card-accent-top::before {
        height: 4px;
      }

      .dashboardActionRow {
        grid-template-columns: 1fr;
      }

      .desktopOnly {
        display: none !important;
      }

      .mobileOnly {
        display: block;
      }

      .mobileApplicationsRail {
        display: grid;
        gap: 10px;
        margin-top: 12px;
        grid-template-columns: 1fr;
      }

      .recommendedStack {
        gap: 12px;
      }

      .grid.cols-2,
      .grid.cols-3,
      .listingGrid {
        grid-template-columns: 1fr;
      }

      .dashboardTopGrid,
      .dashboardMainGrid,
      .dashboardLayoutGrid,
      .careerTwoCol {
        grid-template-columns: 1fr;
      }

      .dashboardQuickHeader {
        padding: 14px;
      }

      .dashboardQuickHeaderActions {
        width: 100%;
      }

      .dashboardQuickHeaderActions .btn {
        width: 100%;
      }

      .opportunityCard,
      .careerOpportunityCard,
      .recommendedCard,
      .mobileApplicationCard {
        padding: 12px;
        border-radius: 16px;
        box-shadow: 0 6px 12px rgba(41, 43, 45, 0.05);
      }

      .opportunityCardLayout {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .opportunityCardActions {
        align-items: stretch;
        min-width: 0;
      }

      .opportunityCardActions .btn {
        width: 100%;
      }

      .statusPill {
        align-self: flex-start;
      }

      .applicationProgressSummary,
      .applicationProgressStepper {
        padding: 12px;
      }

      .applicationStep {
        grid-template-columns: 26px minmax(0, 1fr);
        gap: 10px;
      }

      .applicationStepConnector {
        min-height: 22px;
      }

      .applicationSummaryAction .btn,
      .applicationStepAction .btn {
        width: 100%;
      }

      .adminApplicantDrawerPanel {
        width: 100%;
        max-width: 100%;
        border-left: 0;
        box-shadow: none;
      }

      .adminApplicantDrawerHeader,
      .adminApplicantDrawerBody,
      .adminApplicantDrawerFooter {
        padding-left: var(--mobile-card-pad);
        padding-right: var(--mobile-card-pad);
      }

      .adminApplicantHeaderActions {
        min-width: 0;
      }

      .adminApplicantInfoGrid,
      .adminApplicantFooterActions {
        grid-template-columns: 1fr;
      }

      .adminApplicantDocRow {
        grid-template-columns: 1fr;
      }

      .adminApplicantDocActions {
        justify-content: flex-start;
        min-width: 0;
      }

      .adminApplicantNotesField {
        min-height: 120px;
      }

      .adminApplicantScoreRow {
        grid-template-columns: 1fr;
      }

      .adminApplicantDrawerClose,
      .adminApplicantViewBtn {
        width: 100%;
      }

      .adminApplicantMiniBtn {
        width: auto;
      }

      .quizStepScroller {
        gap: 7px;
        padding-bottom: 8px;
      }

      .quizStepCircle {
        width: 30px;
        height: 30px;
        font-size: 11px;
      }

      .quizStepItem.is-current .quizStepCircle {
        width: 36px;
        height: 36px;
      }

      .mobileList {
        display: grid;
      }

      .careerOptionsGrid {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .inlineProfileEditorOverlay {
        padding: 0;
        align-items: flex-end;
      }

      .inlineProfileEditorSheet {
        width: 100%;
        max-height: calc(100dvh - 10px);
        border-radius: 22px 22px 0 0;
        padding: 16px var(--mobile-card-pad) calc(20px + env(safe-area-inset-bottom));
      }

      .inlineProfileInterestsGrid {
        grid-template-columns: 1fr;
      }

      .inlineProfileEditorActions,
      .inlineProfileEditorActions .row {
        width: 100%;
        display: grid;
        gap: 8px;
      }

      .inlineProfileEditorClose {
        width: auto;
      }

      .inlineProfileEditorActions .btn {
        width: 100%;
      }

      .profileReviewHeader {
        gap: 10px;
      }

      .profileEditTrigger {
        width: 100%;
      }

      .inlineProfileToast {
        width: calc(100% - 24px);
        border-radius: 16px;
        text-align: center;
        bottom: calc(var(--mobile-nav-height) + env(safe-area-inset-bottom) + 10px);
      }

      .careerOption {
        min-height: 46px;
        padding: 9px 12px;
        font-size: 14px;
      }

      .mobileBottomNav {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: calc(10px + env(safe-area-inset-bottom));
        z-index: 35;
        padding: 10px 8px;
        border-radius: 22px;
        background: rgba(32, 35, 39, 0.93);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 12px 26px rgba(16, 19, 23, 0.34);
        backdrop-filter: blur(14px);
      }

      .mobileBottomNavItem {
        min-height: 54px;
        border-radius: 16px;
        color: rgba(255, 255, 255, 0.8);
        display: grid;
        justify-items: center;
        align-content: center;
        gap: 4px;
        font-size: 11px;
        font-weight: 700;
        border: 1px solid transparent;
        transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
      }

      .mobileBottomNavItemIcon {
        font-size: 16px;
        line-height: 1;
      }

      .mobileBottomNavItem.active {
        background: linear-gradient(140deg, rgba(69, 88, 200, 0.95), rgba(127, 83, 181, 0.85));
        color: #fff;
        border-color: rgba(255, 255, 255, 0.22);
      }

      .profileSummaryCard {
        align-items: flex-start;
      }

      .dangerZone .btn {
        width: 100%;
      }
    }
  </style>
</head>

  <script src="functionality.js"></script>
